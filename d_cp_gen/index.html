<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dショッピング キャンペーン HTML ジェネレーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>

  :root {
    --bg:#1d1f21;--surf:#282a2e;--surf2:#373b41;
    --border:#4b4f57;--border2:#626772;--text:#c5c8c6;
    --muted:#969896;--accent:#81a2be;--green:#b5bd68;
    --red:#cc6666;--yellow:#f0c674;--orange:#de935f;
    --purple:#b294bb;--cyan:#8abeb7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','ヒラギノ角ゴ ProN W3','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:18px}

  /* topbar */
  .topbar{display:flex;align-items:center;gap:14px;padding:13px 24px;border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0}
  .logo{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','ヒラギノ角ゴ ProN W3','Noto Sans JP',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.3px;color:#fff}
  .logo span{color:#ffffff}
  .pill{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:15px;background:var(--accent);color:#fff;padding:3px 20px;border-radius:99px}
  .pill.ok{background:var(--green);color:#000}
  .mode-badge{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:12px;padding:3px 10px;border-radius:99px;display:none}
  .mode-badge.cp{background:var(--accent);color:#fff}
  .mode-badge.page{background:var(--orange);color:#000}


  /* layout */
  .workspace{flex:1;display:grid;grid-template-columns:440px 1fr;overflow:hidden;min-height:0}
  .left{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;min-height:0}
  .left-static{flex-shrink:0;padding:10px 12px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid var(--border)}
  .panel-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:9px;min-height:0}
  .left-footer{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--border);background:var(--surf)}

  label{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}
  textarea,input[type=text],input[type=password],select{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;transition:border-color 0.2s}
  textarea:focus,input:focus,select:focus{border-color:var(--accent)}
  textarea::placeholder,input::placeholder{color:var(--border2)}
  input[type=text],input[type=password]{padding:6px 10px;font-size:16px}
  select{padding:6px 10px;font-size:16px;cursor:pointer}
  select option{background:var(--surf2)}

  .draft-area{resize:none;padding:8px;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;min-height:170px}
  .sep{height:1px;background:var(--border)}
  .sec-lbl{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}

  /* CP fields */
  .fields{display:flex;flex-direction:column;gap:10px}
  .field{display:grid;grid-template-columns:128px 1fr;align-items:center;gap:8px}
  .fkey{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;color:var(--yellow);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  input.auto{border-color:rgba(181,189,104,.45);background:rgba(181,189,104,.06)}
  select.auto{border-color:rgba(181,189,104,.45);background:rgba(181,189,104,.06)}

  /* page-mode banner review */
  .page-meta{display:flex;flex-direction:column;gap:8px}
  .page-banners{display:flex;flex-direction:column;gap:12px;margin-top:12px}
  .bnr-row{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
  .bnr-row.warn{border-color:var(--orange)}
  .bnr-row-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .bnr-idx{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);background:var(--surf);padding:2px 8px;border-radius:4px}
  .badge-ok{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:11px;background:rgba(181,189,104,.15);color:var(--green);border:1px solid rgba(181,189,104,.3);padding:1px 7px;border-radius:4px}
  .badge-warn{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:11px;background:rgba(222,147,95,.15);color:var(--orange);border:1px solid rgba(222,147,95,.3);padding:1px 7px;border-radius:4px}
  .bnr-field{display:grid;grid-template-columns:52px 1fr;align-items:center;gap:6px}
  .bnr-fkey{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap}

  /* buttons */
  .extract-btn{width:100%;padding:7px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:15px;cursor:pointer;transition:all 0.15s;letter-spacing:.5px}
  .extract-btn:hover{border-color:var(--accent)}
  .extract-btn:disabled{opacity:.4;cursor:not-allowed}
  .gen-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;font-size:16px;font-weight:700;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .gen-btn:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
  .gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
  .gen-btn.loading .spinner{display:block}
  .gen-btn.loading .btn-lbl{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(204,102,102,.1);border:1px solid rgba(204,102,102,.3);border-radius:6px;padding:9px 11px;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;color:var(--red);display:none}
  .err.show{display:block}

  /* right */
  .right{display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0;overflow-x:auto}
  .tab{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:14px;padding:13px 18px;cursor:pointer;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab.disabled{opacity:.3;pointer-events:none}
  .tab-actions{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 12px}
  .abtn{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:5px;cursor:pointer;transition:all 0.15s;white-space:nowrap;width:100px;padding:7px;text-align:center}
  .abtn:hover{border-color:var(--accent);color:var(--accent)}
  .abtn.dl{background:var(--green);color:#000;border-color:var(--green);font-weight:700;width:100px;padding:7px}
  .abtn.dl:hover{filter:brightness(1.1)}

  .out-area{flex:1;overflow:hidden;position:relative}
  .pane{position:absolute;inset:0;overflow:auto;display:none}
  .pane.active{display:block}
  .code-pane{background:var(--bg)}
  pre{padding:20px 24px;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;line-height:1.75;color:#c5c8c6;white-space:pre-wrap;word-break:break-all}

  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);pointer-events:none}
  .empty-ico{font-size:40px;opacity:.2}
  .empty-ttl{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;font-size:20px;font-weight:700;opacity:.35}
  .empty-sub{font-size:14px;opacity:.3;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif}

  .out-type{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 18px;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif;font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .out-type .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

  .workspace { }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">dショッピング <span>キャンペーン</span> ジェネレーター</div>
  <span id="copy-status-pill" class="pill" style="display:none;background:var(--cyan);color:#000;font-size:13px;padding:1px 10px;"></span>
  <span id="mode-badge" class="mode-badge"></span>
  <span id="status-pill" class="pill ok" style="display:none">生成完了</span>
  <div style="display:flex;gap:8px;margin-left:auto">
    <button class="abtn" onclick="resetAll()">リセット</button>
    <button class="abtn" id="copy-btn" onclick="copyActive()">コピー</button>
<button class="abtn dl" id="dl-btn" onclick="dlActive()">ZIP DL</button>
  </div>
</div>


<div class="workspace">
  <div class="left">
    <!-- 固定上部: textarea + 抽出ボタン -->
    <div class="left-static">
      <div>
        <label>バックログの原稿</label>
        <textarea class="draft-area" id="draft"
          placeholder="バックログ原稿を貼り付けてください。&#10;&#10;【CPページ設定】または【ページ設定】で始まる原稿に対応。"></textarea>
      </div>
      <button class="extract-btn" id="ext-btn" onclick="extractFields()">
        ✦ AIで項目を自動抽出
      </button>
      <div class="err" id="err-box"></div>
    </div>

    <!-- スクロール中部: フィールド / バナー一覧 -->
    <div class="panel-body">

      <!-- CP mode fields -->
      <div id="cp-mode-ui">
        <div class="sec-lbl">プレースホルダー確認・編集</div>
        <div class="fields" id="fields"></div>
      </div>

      <!-- Page mode review -->
      <div id="page-mode-ui" style="display:none">
        <div class="sec-lbl">⚠は画像ファイル名を要確認</div>
        <div class="page-meta" id="page-meta"></div>
        <div class="page-banners" id="page-banners"></div>
      </div>
    </div>

    <!-- 固定下部: 生成ボタン -->
    <div class="left-footer">
      <button class="gen-btn" id="gen-btn" onclick="generateAll()">
        <div class="spinner"></div>
        <span class="btn-lbl">全ファイルを生成</span>
      </button>
    </div>
  </div>

  <div class="right">
    <div class="tabs">
      <div class="tab active" data-tab="list"    onclick="switchTab('list')">CP一覧 スニペット</div>
      <div class="tab"        data-tab="cp-open" onclick="switchTab('cp-open')">CPページ</div>
      <div class="tab"        data-tab="banner"   onclick="switchTab('banner')">バナーパーツ スニペット</div>
      <div class="tab"        data-tab="finished" onclick="switchTab('finished')" id="tab-finished" style="display:none">エントリー完了ページ</div>
      <div class="tab-actions">
      </div>
    </div>

    <div class="out-area">
      <div class="empty" id="empty">
        <div class="empty-ico">◈</div>
        <div class="empty-ttl">原稿を入力して生成</div>
        <div class="empty-sub">【CPページ設定】→ 3ファイルをZIPでDL　/　【ページ設定】→ バナースニペットをDL</div>
      </div>

      <div class="pane code-pane active" id="pane-list">
        <pre id="code-list"></pre>
      </div>
      <div class="pane code-pane" id="pane-cp-open">
        <pre id="code-cp-open"></pre>
      </div>
      <div class="pane code-pane" id="pane-banner">
        <pre id="code-banner"></pre>
      </div>
      <div class="pane code-pane" id="pane-finished">
        <pre id="code-finished"></pre>
      </div>
    </div>
  </div>
</div>

// MODE DETECTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentMode = 'cp'; // 'cp' | 'page'
let pageData = null;    // extracted page-mode data

function detectMode(draft) {
  const trimmed = draft.trimStart();
  if (trimmed.startsWith('【特集ページ設定】')) return 'special_cp';
  if (trimmed.startsWith('【CPページ設定】')) {
    if (/エントリー有/.test(draft)) return 'entry_cp';
    return 'cp';
  }
  if (!trimmed.startsWith('【ページ設定】')) return 'cp';
  if (/クーポン[^\S\n\r　]*対応詳細|クーポン期間|クーポンID|クーポン一覧掲載/.test(draft)) return 'coupon';
  return 'page';
}

function applyMode(mode) {
  currentMode = mode;
  const badge = document.getElementById('mode-badge');
  const cpUI  = document.getElementById('cp-mode-ui');
  const pgUI  = document.getElementById('page-mode-ui');
  const tabs  = document.querySelectorAll('.tab');
  const dlBtn = document.getElementById('dl-btn');

  badge.style.display = '';
  if (mode === 'coupon') {
    badge.textContent = 'クーポンモード';
    badge.className = 'mode-badge page'; badge.style.background='var(--purple)'; badge.style.color='#fff';
    cpUI.style.display = 'none';
    pgUI.style.display = '';
    // クーポン: タブ①のみ有効
    tabs.forEach(t => {
      if (t.dataset.tab === 'list') t.classList.remove('disabled');
      else t.classList.add('disabled');
    });
    document.querySelector('.tab[data-tab="list"]').click();
    document.getElementById('tab-finished').style.display = 'none';
    dlBtn.style.display = 'none';
  } else if (mode === 'page') {
    badge.textContent = '【ページ設定】モード';
    badge.className = 'mode-badge page'; badge.style.background=''; badge.style.color='';
    cpUI.style.display = 'none';
    pgUI.style.display = '';
    // list/cp-open/finished を無効、banner のみ有効
    tabs.forEach(t => {
      if (t.dataset.tab === 'banner') { t.classList.remove('disabled'); t.click(); }
      else t.classList.add('disabled');
    });
    document.getElementById('tab-finished').style.display = 'none';
    // cp-openタブのコンテンツをクリア
    document.getElementById('code-cp-open').textContent = '';
    document.getElementById('code-list').textContent = '';
    dlBtn.style.display = '';
    dlBtn.textContent = 'ZIP DL';
  } else if (mode === 'special_cp') {
    badge.textContent = '特集CPモード';
    badge.className = 'mode-badge cp'; badge.style.background='var(--orange)'; badge.style.color='#fff';
    cpUI.style.display = '';
    pgUI.style.display = 'none';
    tabs.forEach(t => { if (t.id !== 'tab-finished') t.classList.remove('disabled'); });
    document.getElementById('tab-finished').style.display = 'none';
    dlBtn.style.display = '';
    dlBtn.textContent = 'ZIP DL';
  } else if (mode === 'entry_cp') {
    badge.textContent = '火曜CPモード';
    badge.className = 'mode-badge cp'; badge.style.background='var(--cyan)'; badge.style.color='#000';
    cpUI.style.display = '';
    pgUI.style.display = 'none';
    tabs.forEach(t => { if (t.id !== 'tab-finished') t.classList.remove('disabled'); });
    document.getElementById('tab-finished').style.display = 'none'; // 生成まで非表示
    dlBtn.style.display = '';
    dlBtn.textContent = 'ZIP DL';
  } else {
    badge.textContent = '【CPページ設定】モード';
    badge.className = 'mode-badge cp'; badge.style.background=''; badge.style.color='';
    cpUI.style.display = '';
    pgUI.style.display = 'none';
    tabs.forEach(t => { if (t.id !== 'tab-finished') t.classList.remove('disabled'); });
    document.getElementById('tab-finished').style.display = 'none'; // 生成まで非表示
    dlBtn.style.display = '';
    dlBtn.textContent = 'ZIP DL';
  }
}

// PAGE MODE — バナー画像補正
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ページ設定のバナーはPC横長（980x150, 900x150等）を使うべきだが、
// AIが640x200や300x300を選んでしまう場合がある。
// ドラフト内の添付ファイル一覧からPC横長ファイルを特定し、自動補正する。
function _fixPageBannerImages(data) {
  if (!data.banners || !data.banners.length) return;
  const draft = document.getElementById('draft')?.value || '';
  // 添付ファイル一覧を取得（「添付ファイルを追加」以降の .jpg/.png/.gif）
  const attachSection = draft.split(/添付ファイルを追加/)[1] || '';
  const allFiles = (attachSection.match(/[\w\-.]+\.(jpg|jpeg|png|gif)/gi) || []);
  if (!allFiles.length) return;
  // PC横長バナーファイルを特定（980x150, 900x150 等の横長サイズ）
  const pcFile = allFiles.find(f => /9[0-8]0x150/.test(f));
  if (!pcFile) return;
  // 各バナーの画像を補正: AIが選んだファイルが同一プレフィックスの別サイズなら差し替え
  data.banners.forEach(bnr => {
    if (bnr.type === 'end_change' || !bnr.img) return;
    // プレフィックスが同じで640x200や300x300を選んでしまった場合に補正
    const bnrPrefix = bnr.img.replace(/_?\d+x\d+/, '');
    const pcPrefix  = pcFile.replace(/_?\d+x\d+/, '');
    if (bnrPrefix === pcPrefix && bnr.img !== pcFile) {
      bnr.img = pcFile;
      bnr.confidence = 'high'; // 補正済みなので確信度をhighに
    }
  });
}

function buildPageUI(data) {
  pageData = data;

  // 「即時」公開チェック: タイトル行に「即時」「即日」が含まれ、かつ日付も時刻も明記されていない場合のみstart_timerを空にする
  const draft = document.getElementById('draft')?.value || '';
  const titleLine = (draft.match(/【ページ設定】[^\n]*/)||[''])[0];
  if (/即時|即日/.test(titleLine)) {
    // 「yyyy/mm/dd 即時」パターンは日付があるので空にしない（コード側で00:00補完）
    // 日付が全くない場合のみ空にする
    if (!/\d{4}\/\d{1,2}\/\d{1,2}/.test(titleLine)) {
      data.start_timer = '';
    }
  }

  // ページ設定バナーの画像補正: 同一プレフィックスの場合PC横長を優先
  _fixPageBannerImages(data);

  // meta fields (bnr_id, start_timer, end_timer)
  const meta = document.getElementById('page-meta');
  meta.innerHTML = `
    <div class="field">
      <span class="fkey">BNR_ID</span>
      <input type="text" id="pg-bnr-id" value="${data.bnr_id||''}" placeholder="例: 186" oninput="pageData.bnr_id=this.value">
    </div>
    <div class="field">
      <span class="fkey">START</span>
      <input type="text" id="pg-start" value="${data.start_timer||''}" placeholder="yyyy/mm/dd hh:mm" oninput="pageData.start_timer=this.value">
    </div>
    <div class="field">
      <span class="fkey">END</span>
      <input type="text" id="pg-end" value="${data.end_timer||''}" placeholder="yyyy/mm/dd hh:mm" oninput="pageData.end_timer=this.value">
    </div>
  `;

  // banner rows
  const container = document.getElementById('page-banners');
  container.innerHTML = '';
  (data.banners || []).forEach((bnr, i) => {
    const isWarn = bnr.confidence === 'low';
    const row = document.createElement('div');
    row.className = `bnr-row${isWarn?' warn':''}`;
    const isEndChange = bnr.type === 'end_change';
    const isImgChange = bnr.type === 'img_change';
    row.innerHTML = `
      <div class="bnr-row-head">
        <span class="bnr-idx">${bnr.index || (i+1)+'番目'}</span>
        ${isEndChange
          ? `<span class="badge-warn" style="background:rgba(178,148,187,.15);color:var(--purple);border-color:rgba(178,148,187,.3)">終了日変更</span>`
          : isImgChange
            ? `<span class="badge-warn" style="background:rgba(138,190,183,.15);color:var(--cyan);border-color:rgba(138,190,183,.3)">画像変更</span>`
            : isWarn
              ? `<span class="badge-warn">⚠ 要確認</span>`
              : `<span class="badge-ok">✓ 自動マッチ</span>`
        }
      </div>
      <div class="bnr-field">
        <span class="bnr-fkey">alt</span>
        <input type="text" value="${(bnr.alt||'').replace(/"/g,'&quot;')}"
          oninput="pageData.banners[${i}].alt=this.value">
      </div>
      ${(isEndChange) ? '' : `
      ${isImgChange ? '' : `
      <div class="bnr-field">
        <span class="bnr-fkey">URL</span>
        <input type="text" value="${(bnr.url||'').replace(/"/g,'&quot;')}"
          oninput="pageData.banners[${i}].url=this.value">
      </div>`}
      <div class="bnr-field">
        <span class="bnr-fkey">画像</span>
        <input type="text" value="${(bnr.img||'').replace(/"/g,'&quot;')}"
          oninput="pageData.banners[${i}].img=this.value"
          style="${isWarn?'border-color:var(--orange)':''}">
      </div>
      <div class="bnr-field">
        <span class="bnr-fkey">start_date</span>
        <input type="text" value="${(bnr.start_date||'').replace(/"/g,'&quot;')}"
          placeholder="空=即時公開（グローバル日時を使用）"
          oninput="pageData.banners[${i}].start_date=this.value">
      </div>`}
      <div class="bnr-field">
        <span class="bnr-fkey">end_date</span>
        <input type="text" value="${(bnr.end_date||'').replace(/"/g,'&quot;')}"
          placeholder="yyyy/mm/dd hh:mm（なければ空白）"
          oninput="pageData.banners[${i}].end_date=this.value">
      </div>
    `;
    container.appendChild(row);
  });
}

let _extractTimer = null;
function _startExtractTimer(btn) {
  const t0 = Date.now();
  _extractTimer = setInterval(() => {
    const sec = Math.floor((Date.now() - t0) / 1000);
    btn.textContent = `⋯ 抽出中（${sec}秒）`;
  }, 1000);
}
function _stopExtractTimer() {
  if (_extractTimer) { clearInterval(_extractTimer); _extractTimer = null; }
}


async function extractFields() {
  const draft = document.getElementById('draft').value.trim();
  if (!draft){showErr('原稿を入力してください。');return;}
  const headers = {'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  const btn = document.getElementById('ext-btn');
  btn.textContent='⋯ 抽出中（0秒）'; btn.disabled=true; hideErr();
  _startExtractTimer(btn);
  const mode = detectMode(draft);
  applyMode(mode);
  if (mode==='coupon')     await _doExtractCoupon(draft, headers, btn);
  else if (mode==='page') await _doExtractPage(draft, headers, btn);
  else                    await _doExtractCP(draft, headers, btn);
}


async function _doExtractCP(draft, headers, btn) {
  const prompt = `以下のバックログ原稿からキャンペーン情報を抽出し、JSONのみで返してください。
コードブロック・説明文は不要。JSONオブジェクトだけを返してください。

キー一覧:
- CP_ID: 「新規作成ページ」→「キャンペーン」のURL末尾ディレクトリ名をそのまま取得。例: https://...campaign/cp202603645/ → "cp202603645"、https://...campaign/sundrugec446_ptncp_2603/ → "sundrugec446_ptncp_2603"。数字・英字・アンダースコア含む完全な文字列（cp等のプレフィックスも含む）
- CP_NAME: キャンペーン名（完全形）。「CP名」フィールドから取得。【】も含めてそのまま抽出すること
- CP_LEAD: リード文
- CP_START: 「キャンペーンページ　対応詳細」セクション内「開始日時」の値（日本語形式・曜日と時刻の間スペースなし 例: 2026年2月21日(土)00:00）。CP名・CPページあおり文・タイトル行の日付は使用しないこと
- CP_END: 「キャンペーンページ　対応詳細」セクション内「終了日時」の値（日本語形式・「まで」を含まない・曜日と時刻の間スペースなし 例: 2026年3月9日(月)23:59）。CP名・CPページあおり文・タイトル行の日付は使用しないこと
- CP_URL: キャンペーンページURL（「# 新規作成ページ」→「## キャンペーン」のURL）
- START_DATETIME_TIMER: 「キャンペーンページ　対応詳細」セクション内「開始日時」の値（yyyy/mm/dd hh:mm形式 例: 2026/02/21 00:00）
- ENTRY_START_TIMER: タイトル行の「事前エントリ」日時をyyyy/mm/dd hh:mm形式で（例: 2026/05/04 00:00）。「事前エントリ」の記載がない場合はSTART_DATETIME_TIMERと同じ値を返す
- END_DATETIME_TIMER: 「キャンペーンページ　対応詳細」セクション内「終了日時」の値（yyyy/mm/dd hh:mm形式 例: 2026/03/09 23:59）
- END_DATETIME_PLUS_1MIN: 終了日時の1分後（yyyy/mm/dd hh:mm形式 例: 2026/03/10 00:00）
- TARGET_URL: 対象商品URL。以下の優先順で取得。①「対象商品,エントリー後遷移先」の直後のURL（例: https://dshopping.docomo.ne.jp/partner/seedcoms/?pcode=040）。②①がなければ「対象ページ」→「商品詳細」のURL。「対象ページ」の商品詳細URLは②の最終手段であり、①が存在する場合は絶対に使用しないこと
- TARGET_PRODUCTS: 「全商品」または「一部商品」
- SHOP_NAME: ショップ名。タイトル行「【CPページ設定】」の直後から取得。CP_IDを含む文字列（例: cp202603661_daily-3様）の場合はアンダースコア以降「様」の直前まで（例: "daily-3"）。CP_IDを含まない場合は「様」の直前まで（例: "不二家ファミリータウン"）
- MIN_PRICE: 「購入下限金額」の値をカンマ区切り形式で（例: "4,400"）。0または記載なし・なしの場合は空文字
- BNR_ID: 以下の優先順で取得。①「# 【確認用】タイマー設定」内のURL「/parts/products/NNN.html」のNNN（数字のみ）。②①がなければ「対象ページ」→「商品詳細」のURL（例: /products/4464902888728808）の数字列の先頭3桁（例: 4464902888728808 → "446"）。どちらもなければ空文字
- POINT_RATE: ポイント倍率（数字のみ 例: 3）
- POINT_RATE_MINUS_1: 倍率-1（数字のみ 例: 2）
- POINT_YM_1: ポイント進呈年月1（yyyy年m月形式・月は0埋めなし 例: 2026年4月）。「ポイント進呈時期」行に具体的な月が記載されている場合のみ抽出。「下旬 ～ 上旬予定」のみで月の記載がない場合は空文字（システムがEND_DATETIME_TIMERから翌月を自動計算）
- POINT_YM_2: ポイント進呈年月2（yyyy年m月形式・月は0埋めなし 例: 2026年5月）。月の記載がない場合は空文字（システムが翌々月を自動計算）
- POINT_LIMIT: 付与上限（上限なし=空文字、あり=数字のみ 例: 5000）
- ENTRY: 「エントリー有」という記述があれば「有」、なければ「無」
- CAROL: 「CAROL」または「エントリー用URL」という見出しの直後にあるURL（例: https://ent.campaign.docomo.ne.jp/...）。エントリーなしの場合は空文字
- BNR_PC_SIZE: 添付ファイル一覧に「980x150」が含まれていれば"980x150"、なければ（640x200があれば）"640x200"
- BNR_SP_SIZE: 添付ファイル一覧に「640x200」が含まれていれば"640x200"、なければ（980x150があれば）"980x150"
- HAS_300: 添付ファイル一覧に「300x300」が含まれていれば"有"、なければ"無"
- HAS_BNR_SECTION: 原稿に「【mm/dd更新】対応詳細」かつ「商品詳細　対応詳細」というバナー対応セクションがあれば"有"、なければ"無"。「キャンペーンページ　対応詳細」のみの場合は"無"。
- CP_BANNER_URL: 「商品詳細　対応詳細」セクション内に「リンク先URL」が明記されていればそのURL。必ず今回の原稿内のURLのみを使用し、他の原稿・履歴・記憶から推測しないこと。なければ空文字（buildCpBannerSnippetでCP_URLの代わりに使用）
- BNR_PC_FILE: 添付ファイル一覧（「ダウンロード」という文字列の直前にあるファイル名）からファイル名をそのまま取得する。【絶対禁止】300x300はCP一覧サムネイル専用のため、PC用・SP用タイトル画像として絶対に選んではならない。PC用＝以下の優先順で選択: ①ファイル名中に「980」と「150」の両方を含むもの（例: kayoup5_980x150.jpg）。②①がなければ、横長サイズ（幅x高さで幅>高さ、かつ300x300や640x200ではないもの。例: cp202604948_900x150.jpg）。③①②がなければ「640」と「200」を含むファイル名。ファイル名は一切変更・省略せずそのまま出力すること
- BNR_SP_FILE: 添付ファイル一覧からファイル名をそのまま取得。【絶対禁止】300x300はCP一覧サムネイル専用のため、SP用タイトル画像として絶対に選んではならない。SP用＝①ファイル名中に「640」と「200」の両方を含むもの（例: cp202604614_640x200_260401.jpg）。①がなければ②「980」と「150」を含むファイル名。①②どちらもなければ空文字（300x300は絶対に選ばない）。ファイル名は一切変更・省略せずそのまま出力すること
- BNR_300_FILE: 添付ファイル一覧からファイル名をそのまま取得。サムネイル用＝ファイル名中に「300」を含むもの（例: kayoup5_300x300.jpg, cp202604614_300x300_260401.jpg）。なければ空文字。ファイル名は一切変更・省略せずそのまま出力すること
- CP_TOKUTEN: 原稿に「<キャンペーン特典文言>」セクションがある場合、その内容をHTML形式で整形した文字列。以下のルールで変換する：
  先頭に「キャンペーン特典」というタイトル行がある場合はスキップ（dtタグと重複するため）
  次の行がポイント倍率等のタイトル（例:「ポイント最大20倍」）→ そのままテキスト、<br>付き
  説明文 → 改行を<br>に変換してそのまま
  「・XX倍商品〜」の箇所は <ul style="text-indent: -1em; margin-left: 1em;"> の li リスト形式に変換。・（中黒）はそのままliの中に残すこと（削除しない）。例: <li>・20倍商品　100円...</li>
  全体をddタグの中身として完結させる。セクションがなければ空文字
- CP_DATES: 「※CP実施日」直後の行（例:「火曜（2/3・17・24）」）から実施日を「m月d日・d日・d日」形式で生成。月は先頭日付から取得、以降の日は日のみ。0埋めなし（例: 2月3日・17日・24日）

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getVal(key) {
  const el = document.getElementById(`f-${key}`);
  return el ? el.value.trim() : (vals[key]||'');
}
function getValues() {
  const v = {};
  FIELDS.forEach(f => v[f.key] = getVal(f.key));
  return v;
}
function trimDayTime(s) { return (s||'').replace(/\)\s+(\d)/g,')$1'); }

// 「yyyy年m月d日(X)hh:mm」の(X)を正しい曜日に置き換える
const WEEKDAYS = ['日','月','火','水','木','金','土'];
function fixWeekday(s) {
  return (s||'').replace(/(\d{4})年(\d{1,2})月(\d{1,2})日\([^)]+\)/g, (_, y, m, d) => {
    const dow = WEEKDAYS[new Date(+y, +m - 1, +d).getDay()];
    return `${y}年${m}月${d}日(${dow})`;
  });
}
function stripZeroMonth(ym) { return (ym||'').replace(/年0(\d)月/,'年$1月'); }
function fmtNum(n) { return Number(String(n).replace(/[^\d]/g,'')).toLocaleString('ja-JP'); }

// ポイント進呈年月: 原稿に月の記載がない場合はEND_DATETIME_TIMERから自動計算
// offset=1 → 翌月（下旬）、offset=2 → 翌々月（上旬）
function derivePointYM(v, ymKey, offset) {
  const ym = stripZeroMonth(v[ymKey] || '');
  if (ym) return ym;
  const endDt = (v.END_DATETIME_TIMER || '').trim();
  const m = endDt.match(/(\d{4})\/(\d{2})/);
  if (!m) return '';
  let year = parseInt(m[1], 10);
  let month = parseInt(m[2], 10) + offset;
  while (month > 12) { month -= 12; year++; }
  return `${year}年${month}月`;
}

// バナーファイル名を優先度（980x150 > 640x200 > その他横長）で選択
function pickBannerFile(v) {
  const candidates = [v.BNR_PC_FILE, v.BNR_SP_FILE].filter(Boolean);
  const has = (f, ...nums) => nums.every(n => f.includes(String(n)));
  // ① 980x150 を最優先
  const f980 = candidates.find(f => has(f, '980x150') || (has(f, '980') && has(f, '150')));
  if (f980) return f980;
  // ② その他のPC横長（900x150等、幅>高さかつ高さ≦200）
  const pcWide = candidates.find(f => {
    const m = f.match(/(\d+)[x×](\d+)/i);
    return m && parseInt(m[1]) > parseInt(m[2]) && parseInt(m[2]) <= 200 && !f.includes('640x200');
  });
  if (pcWide) return pcWide;
  // ③ 640x200（SP用）
  const f640 = candidates.find(f => has(f, '640x200') || (has(f, '640') && has(f, '200')));
  if (f640) return f640;
  // ④ その他の横長
  const other = candidates.find(f => {
    const m = f.match(/(\d+)[x×](\d+)/i);
    return m && parseInt(m[1]) > parseInt(m[2]);
  });
  return other || candidates[0] || '';
}

function stripComments(html) {
  const lines = html.split('\n');
  const result = [];
  for (let line of lines) {
    const trimmed = line.trim();
    if (/^<!--.*?-->$/.test(trimmed)) continue;
    const cleaned = line.replace(/<!--.*?-->/g,'').replace(/\s+$/,'');
    if (cleaned.trim()==='' && trimmed!=='') continue;
    result.push(cleaned);
  }
  return result.join('\n').replace(/\n{3,}/g,'\n\n');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BUILD — CP MODE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildCampaignHtml() {
  const v = getValues();
  // エントリー有の場合はentryテンプレートを使用
  let html = v.ENTRY === '有' ? TEMPLATE_ENTRY_HTML : TEMPLATE_HTML;
  // MV画像: BNR_PC_FILE / BNR_SP_FILE の実ファイル名で置換（※cp{{CP_ID}}正規化の前に実行）
  const pcFile = v.BNR_PC_FILE || '';
  const spFile = v.BNR_SP_FILE || '';
  if (pcFile || spFile) {
    html = html.replace(
      /(<img src="[^"]*img\/)cp\{\{CP_ID\}\}_\{\{BNR_SIZE\}\}\.jpg("[^>]*class="img-fit nosp">)/g,
      `$1${pcFile || spFile}$2`
    );

function buildEntryCpFinishedHtml() {
  const v = getValues();
  let html = TEMPLATE_FINISHED_HTML;
  const pcFile = v.BNR_PC_FILE || v.BNR_SP_FILE || '';
  const spFile = v.BNR_SP_FILE || v.BNR_PC_FILE || '';
  // 画像置換を cp{{CP_ID}} 正規化より先に行う
  html = html.split('\n').map(line => {
    if (!line.includes('img-fit')) return line;
    if (line.includes('nosp')) {
      return line
        .replace(/cp{{CP_ID}}_{{BNR_SIZE}}\.jpg/, pcFile)
        .replace(/cp[^/]+_{{BNR_SIZE}}\.jpg/, pcFile)
        .replace(/{{BNR_SIZE}}/, '');
    }
    if (line.includes('nopc')) {
      return line
        .replace(/cp{{CP_ID}}_{{BNR_SIZE}}\.jpg/, spFile)
        .replace(/cp[^/]+_{{BNR_SIZE}}\.jpg/, spFile)
        .replace(/{{BNR_SIZE}}/, '');
    }
    return line;
  }).join('\n');
  html = html.split('cp{{CP_ID}}').join('{{CP_ID}}');
  // 残った{{BNR_SIZE}}を念のため除去
  html = html.replace(/cp{{CP_ID}}_{{BNR_SIZE}}\.jpg/g, pcFile);
  const reps = {
    '{{CP_ID}}':v.CP_ID,'{{CP_NAME}}':v.CP_NAME,'{{TARGET_URL}}':v.TARGET_URL,
  };
  for (const [ph,val] of Object.entries(reps)) html = html.split(ph).join(val);
  return stripComments(html);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BUILD — PAGE MODE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 終了日時が 00:00 の場合は前日 23:59 に変換（00:00公開終了＝前日23:59まで表示）
function adjustEndDate(dt) {
  if (!dt) return dt;
  dt = dt.trim();
  if (!/\s00:00$/.test(dt)) return dt;
  // 年月日を個別にパース（new Date文字列直接渡しはNaNリスクあり）
  const parts = dt.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+00:00/);
  if (!parts) return dt;
  const d = new Date(parseInt(parts[1]), parseInt(parts[2]) - 1, parseInt(parts[3]));
  if (isNaN(d.getTime())) return dt; // NaNガード
  d.setDate(d.getDate() - 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day} 23:59`;
}

function buildPageBannerSnippets() {
  if (!pageData || !pageData.banners || !pageData.banners.length) {
    throw new Error('バナーデータがありません。先にAI自動抽出を実行してください。');
  }
  // sync from inputs
  const bnrId    = (document.getElementById('pg-bnr-id')?.value || pageData.bnr_id || '').trim();
  let   startDt  = (document.getElementById('pg-start')?.value  || pageData.start_timer || '').trim();
  const endDt    = adjustEndDate((document.getElementById('pg-end')?.value || pageData.end_timer || '').trim());
  // AIがstart_timerを空で返した場合、ドラフトのタイトル行から直接パース
  // 「即時」でも日付が明記されていれば yyyy/mm/dd 00:00 として使用する
  if (!startDt) {
    const draft = document.getElementById('draft')?.value || '';
    const titleLine = (draft.match(/【ページ設定】[^\n]*/)||[''])[0];
    if (/即時|即日/.test(titleLine)) {
      // 即時パターン: 日付のみ（時刻なし）で「即時」が続く場合 → 00:00 として扱う
      const mSoku = titleLine.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s*(?:即時|即日)/);
      if (mSoku) {
        startDt = `${mSoku[1]}/${String(mSoku[2]).padStart(2,'0')}/${String(mSoku[3]).padStart(2,'0')} 00:00`;
      }
    } else {
      const m = draft.match(/【ページ設定】[^\n]*?(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})（公開日）/);
      if (m) {
        startDt = `${m[1]}/${String(m[2]).padStart(2,'0')}/${String(m[3]).padStart(2,'0')} ${String(m[4]).padStart(2,'0')}:${m[5]}`;
      }
    }
  }

  // 連続差し替えパターン: 同一indexでadd→img_change→img_changeと並ぶ場合、
  // end_dateが空のバナーには「次のバナーのstart_dateの1分前」を自動設定する
  const banners = pageData.banners;
  for (let i = 0; i < banners.length; i++) {
    const cur = banners[i];
    if (cur.type === 'end_change') continue;
    const curEnd = (cur.end_date || '').trim();
    if (curEnd) continue; // 既にend_dateがあればスキップ
    // 同一indexの次のバナーを探す
    const next = banners.slice(i + 1).find(b => b.index === cur.index && b.type !== 'end_change');
    if (next) {
      const nextStart = (next.start_date || '').trim();
      if (nextStart) {
        // nextStartの1分前を算出
        const pm = nextStart.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
        if (pm) {
          const nd = new Date(parseInt(pm[1]), parseInt(pm[2])-1, parseInt(pm[3]), parseInt(pm[4]), parseInt(pm[5]));
          nd.setMinutes(nd.getMinutes() - 1);
          const pad = n => String(n).padStart(2,'0');
          cur.end_date = `${nd.getFullYear()}/${pad(nd.getMonth()+1)}/${pad(nd.getDate())} ${pad(nd.getHours())}:${pad(nd.getMinutes())}`;
        }
      }
    }
  }

  return banners.map(bnr => {
    const bnrEndDt   = adjustEndDate((bnr.end_date !== undefined ? bnr.end_date : '').trim());
    // バナー個別のstart_dateが空でなければそれを使用、空またはundefinedならグローバルstartDtにフォールバック
    const bnrStartDt = (bnr.start_date !== undefined && bnr.start_date !== '' ? bnr.start_date : startDt).trim();
    if (bnr.type === 'end_change') {
      return `<div data-end-date="${bnrEndDt}">\n</div>`;
    }
    if (bnr.type === 'img_change') {
      // 画像のみ変更: URLは同一indexのaddバナーから引き継ぐ。空でもpointer-events:noneは付けない
      const imgEndDt = bnrEndDt || endDt;
      const parentAdd = banners.find(b => b.type === 'add' && b.index === bnr.index);
      const inheritUrl = bnr.url || (parentAdd ? parentAdd.url : '') || '';
      return `<div class="view_timer" data-start-date="${bnrStartDt}" data-end-date="${imgEndDt}" style="display:none">
\t<a href="${inheritUrl}">
\t\t<img src="/parts/products/img/${bnrId}/${bnr.img||''}" width="100%" alt="${bnr.alt||''}">
\t</a>
</div>`;
    }
    // type="add": フルスニペット
    const addEndDt = bnrEndDt || endDt;
    const addUrl = bnr.url || '';
    const addAStyle = addUrl ? '' : ' style="pointer-events:none;"';
    return `<div class="view_timer" data-start-date="${bnrStartDt}" data-end-date="${addEndDt}" style="display:none">
\t<a href="${addUrl}"${addAStyle}>
\t\t<img src="/parts/products/img/${bnrId}/${bnr.img||''}" width="100%" alt="${bnr.alt||''}">
\t</a>
</div>`;
  }).join('\n');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GENERATE ALL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const outputs = {};

function generateAll() {
  FIELDS.forEach(f => { const inp=document.getElementById(`f-${f.key}`); if(inp) vals[f.key]=inp.value; });

  // END_DATETIME_PLUS_1MIN が空の場合は END_DATETIME_TIMER から自動計算
  if (!vals['END_DATETIME_PLUS_1MIN'] && vals['END_DATETIME_TIMER']) {
    const d = new Date(vals['END_DATETIME_TIMER'].replace(/\//g,'-').replace(' ','T'));
    if (!isNaN(d)) {
      d.setMinutes(d.getMinutes() + 1);
      const pad = n => String(n).padStart(2,'0');
      vals['END_DATETIME_PLUS_1MIN'] = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      // UIフィールドにも反映
      const inp = document.getElementById('f-END_DATETIME_PLUS_1MIN');
      if (inp) inp.value = vals['END_DATETIME_PLUS_1MIN'];
    }
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled=true; btn.classList.add('loading');
  hideErr();

  try {
    if (currentMode === 'coupon') {
      outputs.list   = buildCouponListSnippet();
      outputs.banner = '';
      outputs.cpOpen = '';
      outputs.finished = '';
      document.getElementById('code-list').textContent = outputs.list;
      switchTab('list');
    } else if (currentMode === 'special_cp') {
      const v = getValues();
      outputs.list   = v.HAS_300 !== '無' ? buildSpecialListSnippet() : '';
      outputs.cpOpen = buildSpecialCpHtml();
      outputs.banner = v.HAS_BNR_SECTION !== '無' ? buildSpecialBannerSnippet() : '';
      outputs.finished = '';
      if (outputs.list) document.getElementById('code-list').textContent = outputs.list;
      else { document.getElementById('code-list').textContent='（300x300なし — スキップ）'; document.querySelectorAll('.tab[data-tab="list"]').forEach(t=>t.classList.add('disabled')); }
      document.getElementById('code-cp-open').textContent = outputs.cpOpen;
      if (outputs.banner) document.getElementById('code-banner').textContent = outputs.banner;
      else { document.getElementById('code-banner').textContent='（バナーセクションなし — スキップ）'; document.querySelectorAll('.tab[data-tab="banner"]').forEach(t=>t.classList.add('disabled')); }
      document.getElementById('tab-finished').style.display = 'none';
      switchTab('cp-open');
    } else if (currentMode === 'entry_cp') {
      const v = getValues();
      outputs.list   = buildListSnippet();
      outputs.cpOpen = buildEntryCpHtml();
      outputs.finished = buildEntryCpFinishedHtml();
      document.getElementById('code-list').textContent    = outputs.list;
      document.getElementById('code-cp-open').textContent = outputs.cpOpen;
      document.getElementById('code-finished').textContent = outputs.finished;
      // entry_cpでもHAS_BNR_SECTION=有ならバナースニペットを生成
      if (v.HAS_BNR_SECTION !== '無') {
        outputs.banner = buildCpBannerSnippet();
        document.getElementById('code-banner').textContent = outputs.banner;
        document.querySelectorAll('.tab[data-tab="banner"]').forEach(t => t.classList.remove('disabled'));
      } else {
        outputs.banner = '';
        document.getElementById('code-banner').textContent = '（商品詳細バナーセクションなし — スキップ）';
        document.querySelectorAll('.tab[data-tab="banner"]').forEach(t => t.classList.add('disabled'));
      }
      const tfTab = document.getElementById('tab-finished');
      tfTab.classList.remove('disabled');
      tfTab.style.display = '';
      switchTab('cp-open');
    } else if (currentMode === 'page') {
      outputs.banner = buildPageBannerSnippets();
      outputs.list   = '';
      outputs.cpOpen = '';
      outputs.finished = '';
      document.getElementById('code-banner').textContent = outputs.banner;
      switchTab('banner');
    } else {
      const v = getValues();
      // HAS_300の有無に関わらず常にCP一覧スニペットを生成（300x300がない場合はデフォルトファイル名で出力）
      outputs.list = buildListSnippet();
      document.getElementById('code-list').textContent = outputs.list;
      document.querySelectorAll('.tab[data-tab="list"]').forEach(t => t.classList.remove('disabled'));
      outputs.cpOpen = buildCampaignHtml();
      document.getElementById('code-cp-open').textContent = outputs.cpOpen;
      // HAS_BNR_SECTION=無 → バナースニペットをスキップ
      if (v.HAS_BNR_SECTION === '無') {
        outputs.banner = '';
        document.getElementById('code-banner').textContent = '（商品詳細バナーセクションなし — スキップ）';
        document.querySelectorAll('.tab[data-tab="banner"]').forEach(t => t.classList.add('disabled'));
      } else {
        outputs.banner = buildCpBannerSnippet();
        document.getElementById('code-banner').textContent = outputs.banner;
        document.querySelectorAll('.tab[data-tab="banner"]').forEach(t => t.classList.remove('disabled'));
      }
      // エントリー有: finished.html を生成してタブ④表示
      if (v.ENTRY === '有') {
        outputs.finished = buildFinishedHtml();
        document.getElementById('code-finished').textContent = outputs.finished;
        document.getElementById('tab-finished').style.display = '';
      } else {
        outputs.finished = '';
        document.getElementById('tab-finished').style.display = 'none';
      }
    }
    document.getElementById('empty').style.display = 'none';
    const pill = document.getElementById('status-pill');
    pill.style.display=''; setTimeout(()=>pill.style.display='none',3000);
  } catch(e) {
    showErr('生成に失敗: ' + e.message);
  } finally {
    btn.disabled=false; btn.classList.remove('loading');
  }
}

  document.getElementById('draft').value = '';
  FIELDS.forEach(f => vals[f.key] = f.key === 'TARGET_PRODUCTS' ? '全商品' : '');

// ━━━ TAB ━━━
let activeTab = 'list';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`pane-${tab}`)?.classList.add('active');
}

// ━━━ COPY ━━━
function getActiveCode() {
  const map = {list:'list','cp-open':'cp-open',banner:'banner',finished:'finished'};
  return document.getElementById(`code-${map[activeTab]}`)?.textContent||'';
}
const TAB_LABELS = {list:'CP一覧 スニペット','cp-open':'CPページ',banner:'バナーパーツ スニペット',finished:'エントリー完了ページ'};

function copyActive() {
  const code = getActiveCode();
  if (!code) return;
  const label = TAB_LABELS[activeTab] || activeTab;
  const flash = () => {
    const pill = document.getElementById('copy-status-pill');
    pill.textContent = 'スニペットをコピーしました';
    pill.style.display = '';
    setTimeout(() => { pill.style.display = 'none'; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(flash).catch(() => fallbackCopy(code, flash));
  } else {
    fallbackCopy(code, flash);
  }
}


function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) { alert('コピーに失敗しました。手動でコピーしてください。'); }
  document.body.removeChild(ta);
}

// ━━━ DL ━━━
async function dlActive() {
  if (currentMode === 'page') {
    // pageモード: {BNR_ID}/bnr_snippets.html をZIPでDL
    const code = outputs.banner || '';
    if (!code) { showErr('先に「全ファイルを生成」を実行してください。'); return; }
    const bnrId = (document.getElementById('pg-bnr-id')?.value || pageData?.bnr_id || 'bnr').trim();
    const zip = new JSZip();
    zip.folder(bnrId).file('bnr_snippets.html', code);
    const blob = await zip.generateAsync({type:'blob'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`${bnrId}.zip`; a.style.display='none';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  } else {
    if (!outputs.cpOpen) { showErr('先に「全ファイルを生成」を実行してください。'); return; }
    const v   = getValues();
    const cpId = v.CP_ID || 'cp';
    const zip = new JSZip();
    const folder = zip.folder(cpId);
    folder.file('index.html', outputs.cpOpen || '');
    if ((v.ENTRY === '有' || currentMode === 'entry_cp') && outputs.finished) {
      folder.file('finished.html', outputs.finished);
    }
    folder.folder('img').file('.gitkeep', '');
    const blob = await zip.generateAsync({type:'blob'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`${cpId}.zip`; a.style.display='none';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent='⚠ '+msg; el.classList.add('show');
}
function hideErr() {
  document.getElementById('err-box').classList.remove('show');
}
