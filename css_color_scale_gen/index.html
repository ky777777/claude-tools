<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラースケール生成</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --ink:#16181d; --sub:#6b7080; --line:#e6e7ec; --bg:#fafafb; --card:#fff;
    --accent:#3B82F6;
  }
  body{
    font-family:-apple-system,"Segoe UI","Hiragino Sans",sans-serif;
    background:var(--bg); color:var(--ink); padding:32px 20px; line-height:1.5;
  }
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:20px;font-weight:700;letter-spacing:-.01em;}
  .lede{color:var(--sub);font-size:13px;margin-top:4px;}

  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px;margin-top:20px;display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;}
  .hexrow{display:flex;align-items:center;gap:10px;}
  input[type=color]{width:46px;height:46px;border:1px solid var(--line);border-radius:10px;background:none;cursor:pointer;padding:2px;}
  input[type=text],input[type=number]{
    font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:14px;
    border:1px solid var(--line);border-radius:9px;padding:11px 12px;width:124px;background:#fff;color:var(--ink);
  }
  input[type=number]{width:70px;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent;}
  .pct{display:flex;gap:20px;}

  .ramp{margin-top:22px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);}
  .row{display:flex;align-items:center;gap:14px;padding:0 16px;height:52px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#f4f5f8;}
  .chip{width:54px;height:32px;border-radius:7px;flex:none;border:1px solid rgba(0,0,0,.08);}
  .step{font-weight:700;font-size:13px;width:42px;}
  .meta{font-size:10.5px;color:var(--sub);width:78px;}
  .hex{font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:13.5px;color:var(--ink);margin-left:auto;letter-spacing:.02em;}
  .copyhint{font-size:10px;color:var(--sub);opacity:0;transition:opacity .12s;width:64px;text-align:right;}
  .row:hover .copyhint{opacity:1;}

  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  button.exp{
    font-size:13px;font-weight:600;padding:10px 16px;border-radius:9px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;transition:.12s;
  }
  button.exp:hover{border-color:var(--accent);color:var(--accent);}
  button.exp:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .note{font-size:11.5px;color:var(--sub);margin-top:16px;line-height:1.7;}
  .note b{color:var(--ink);font-weight:600;}

  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;
    opacity:0;pointer-events:none;transition:.2s;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .bundlebox{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .bundlelabel{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chip-f{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:8px;padding:6px 12px 6px 8px;}
  .chip-f .fsw{width:18px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.1);}
  .chips .empty{color:var(--sub);font-size:12px;font-weight:400;}
  #loadjson{width:100%;min-height:114px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
    font-family:"SFMono-Regular",Menlo,monospace;font-size:11.5px;color:var(--ink);resize:vertical;margin-top:34px;}
  #loadjson:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent;}
</style>
</head>
<body>
<div class="wrap">
  <h1>カラースケール生成</h1>
  <p class="lede">メインカラーを入れると 25〜950 を一気に出力。クリックでhexコピー。</p>

  <div class="panel">
    <div class="field">
      <label>入力色（= 500）</label>
      <div class="hexrow">
        <input type="color" id="picker" value="#3B82F6" aria-label="カラーピッカー">
        <input type="text" id="hexin" value="#3B82F6" aria-label="16進数">
      </div>
    </div>
    <div class="field">
      <label>トークン名</label>
      <input type="text" id="fam" value="main" aria-label="トークン名（main / sub / gray など）">
    </div>
    <div class="field">
      <label>50の白ブレンド割合</label>
      <div class="pct">
        <div class="hexrow"><input type="number" id="p25" value="5" min="1" max="49" aria-label="25のパーセント"><span style="font-size:13px;color:var(--sub);align-self:center">% → 25</span></div>
        <div class="hexrow"><input type="number" id="p10" value="3" min="1" max="49" aria-label="10のパーセント"><span style="font-size:13px;color:var(--sub);align-self:center">% → 10</span></div>
      </div>
    </div>
  </div>

  <div class="ramp" id="ramp"></div>

  <div class="actions">
    <button class="exp" id="scss">SCSS変数をコピー</button>
    <button class="exp" id="css">CSS変数をコピー</button>
    <button class="exp" id="json">JSON（単体）をコピー</button>
  </div>

  <div class="actions" style="margin-top:10px">
    <button class="exp" id="add" style="border-color:var(--accent);color:var(--accent)">＋ この色を追加する</button>
    <button class="exp" id="copybundle">結合JSONをコピー</button>
    <button class="exp" id="clearbundle">クリア</button>
  </div>
  <div class="bundlebox">
    <div class="bundlelabel">JSONに入ってるカラースケール</div>
    <div class="chips" id="bundlechips"><span class="empty">（空）— main / gray / sub をそれぞれ追加 → 結合JSONをコピー</span></div>
  </div>

  <textarea id="loadjson" placeholder="保存しておいたマスター結合JSONをここに貼り付けてから、下のボタンを押すと束に復元されます（ファイル選択は不要・貼り付け式）"></textarea>
  <div class="actions" style="justify-content:center;margin-top:8px">
    <button class="exp" id="loadbtn" style="color:var(--accent)">既存のJSONを読み込む</button>
  </div>

  <p class="note">
    <b>方式：</b>50〜950は知覚的（OKLCH）ランプで生成。<b>500は入力色そのまま</b>。25/10は白ブレンド（自分方式）。<br>
    50〜950はTailwind公式値の<b>近似</b>です（公式は手調整なので完全一致ではない）。gray用に黒寄りの色を入れれば、そのままグレースケールも出ます。
  </p>
</div>
<div id="toast"></div>

<script>
const STEPS = [50,100,200,300,400,500,600,700,800,900,950];
// 各ステップの目標明度(OKLab L)と彩度係数（中間が濃く、両端で抑える）
const TARGET_L = {50:.971,100:.936,200:.879,300:.812,400:.740,500:.659,600:.586,700:.512,800:.446,900:.398,950:.314};
const CHROMA_F = {50:.34,100:.46,200:.62,300:.78,400:.92,500:1,600:1,700:.96,800:.86,900:.78,950:.66};

// ---- sRGB <-> OKLab ----
const lin=c=>{c/=255;return c<=.04045?c/12.92:Math.pow((c+.055)/1.055,2.4);};
const gam=c=>{c=c<=.0031308?12.92*c:1.055*Math.pow(c,1/2.4)-.055;return Math.round(Math.min(1,Math.max(0,c))*255);};
function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgb2hex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();}
function rgb2oklab(r,g,b){
  r=lin(r);g=lin(g);b=lin(b);
  const l=.4122214708*r+.5363325363*g+.0514459929*b,
        m=.2119034982*r+.6806995451*g+.1073969566*b,
        s=.0883024619*r+.2817188376*g+.6299787005*b;
  const l_=Math.cbrt(l),m_=Math.cbrt(m),s_=Math.cbrt(s);
  return[.2104542553*l_+.7936177850*m_-.0040720468*s_,
         1.9779984951*l_-2.4285922050*m_+.4505937099*s_,
         .0259040371*l_+.7827717662*m_-.8086757660*s_];
}
function oklab2rgb(L,a,b){
  const l_=L+.3963377774*a+.2158037573*b,
        m_=L-.1055613458*a-.0638541728*b,
        s_=L-.0894841775*a-1.2914855480*b;
  const l=l_**3,m=m_**3,s=s_**3;
  return[gam(4.0767416621*l-3.3077115913*m+.2309699292*s),
         gam(-1.2684380046*l+2.6097574011*m-.3413193965*s),
         gam(-.0041960863*l-.7034186147*m+1.7076147010*s)];
}
// 範囲外チャンネルが無いか
function inGamut(L,a,b){
  const l_=L+.3963377774*a+.2158037573*b,m_=L-.1055613458*a-.0638541728*b,s_=L-.0894841775*a-1.2914855480*b;
  const l=l_**3,m=m_**3,s=s_**3;
  const R=4.0767416621*l-3.3077115913*m+.2309699292*s,
        G=-1.2684380046*l+2.6097574011*m-.3413193965*s,
        B=-.0041960863*l-.7034186147*m+1.7076147010*s;
  const e=.0001;return R>=-e&&R<=1+e&&G>=-e&&G<=1+e&&B>=-e&&B<=1+e;
}

function buildRamp(hex,p25,p10){
  const [r,g,b]=hex2rgb(hex);
  const [L0,a0,b0]=rgb2oklab(r,g,b);
  const C0=Math.hypot(a0,b0), h0=Math.atan2(b0,a0);
  const shift=L0-TARGET_L[500]; // 500を入力のLに合わせる
  const out={};
  // sub-50: 白ブレンド
  const blend=p=>rgb2hex(...[r,g,b].map(c=>Math.round(c*p+255*(1-p))));
  out[25]=blend(p25/100);
  out[10]=blend(p10/100);
  for(const s of STEPS){
    if(s===500){out[500]=hex.toUpperCase();continue;}
    let L=Math.min(.999,Math.max(.02,TARGET_L[s]+shift));
    let C=C0*CHROMA_F[s];
    // ガマット内に収まるまで彩度を落とす
    let a=C*Math.cos(h0),bb=C*Math.sin(h0);
    while(C>0&&!inGamut(L,a,bb)){C*=.96;a=C*Math.cos(h0);bb=C*Math.sin(h0);}
    out[s]=rgb2hex(...oklab2rgb(L,a,bb));
  }
  return out;
}

const ORDER=[25,10,50,100,200,300,400,500,600,700,800,900,950].sort((x,y)=>y-x);
let current={};

function render(){
  const hex=document.getElementById('hexin').value.trim();
  if(!/^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(hex))return;
  const norm=hex.startsWith('#')?hex:'#'+hex;
  const p25=+document.getElementById('p25').value||5;
  const p10=+document.getElementById('p10').value||3;
  current=buildRamp(norm,p25,p10);
  const ramp=document.getElementById('ramp');ramp.innerHTML='';
  ORDER.forEach(s=>{
    const hx=current[s];
    const row=document.createElement('div');row.className='row';
    let meta = s===500?'入力色':(s<50?'白ブレンド':'OKLCH');
    row.innerHTML=`<span class="chip" style="background:${hx}"></span>
      <span class="step">${s}</span>
      <span class="meta">${meta}</span>
      <span class="hex">${hx}</span>
      <span class="copyhint">クリックでコピー</span>`;
    row.onclick=()=>copy(hx,`${s} : ${hx}`);
    ramp.appendChild(row);
  });
}
function fam(){const v=document.getElementById('fam').value.trim();return v||'main';}
function exportSCSS(){const f=fam();return ORDER.map(s=>`$color-${f}-${s}: ${current[s]};`).join('\n');}
function exportCSS(){const f=fam();return ':root {\n'+ORDER.map(s=>`  --color-${f}-${s}: ${current[s]};`).join('\n')+'\n}';}
function exportJSON(){
  const f=fam();const o={};
  ORDER.forEach(s=>o[s]={value:current[s],type:'color'});
  return JSON.stringify({color:{[f]:o}},null,2);
}

function copy(text,label){
  const done=()=>toast(label?`${label} をコピー`:'コピーしました');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  }else fallback(text,done);
}
function fallback(text,done){
  const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();
  try{document.execCommand('copy');}catch(e){}document.body.removeChild(t);done();
}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1600);}

// bundle（複数ファミリーを束ねる）
let bundle={};
function refreshBundle(){
  const el=document.getElementById('bundlechips');
  const names=Object.keys(bundle);
  if(!names.length){el.innerHTML='<span class="empty">（空）— main / gray / sub をそれぞれ追加 → 結合JSONをコピー</span>';return;}
  el.innerHTML=names.map(n=>`<span class="chip-f"><span class="fsw" style="background:${bundle[n]['500'].value}"></span>${n}</span>`).join('');
}

// events
const picker=document.getElementById('picker'),hexin=document.getElementById('hexin');
picker.addEventListener('input',()=>{hexin.value=picker.value.toUpperCase();render();});
hexin.addEventListener('input',()=>{const v=hexin.value.trim();if(/^#?[0-9a-fA-F]{6}$/.test(v)){picker.value=v.startsWith('#')?v:'#'+v;}render();});
document.getElementById('p25').addEventListener('input',render);
document.getElementById('p10').addEventListener('input',render);
document.getElementById('scss').onclick=()=>copy(exportSCSS(),'SCSS');
document.getElementById('css').onclick=()=>copy(exportCSS(),'CSS変数');
document.getElementById('json').onclick=()=>copy(exportJSON(),'JSON');
document.getElementById('add').onclick=()=>{
  const f=fam();const o={};ORDER.forEach(s=>o[s]={value:current[s],type:'color'});
  bundle[f]=o;refreshBundle();toast(`${f} を追加`);
};
document.getElementById('copybundle').onclick=()=>{
  if(!Object.keys(bundle).length){toast('束が空です');return;}
  copy(JSON.stringify({color:bundle},null,2),'結合JSON');
};
document.getElementById('clearbundle').onclick=()=>{bundle={};refreshBundle();toast('クリア');};
document.getElementById('loadbtn').onclick=()=>{
  const t=document.getElementById('loadjson').value.trim();
  if(!t){toast('JSONを貼ってください');return;}
  try{
    const data=JSON.parse(t);
    const col=data.color||data;
    let n=0;
    Object.keys(col).forEach(f=>{ if(col[f] && typeof col[f]==='object'){ bundle[f]=col[f]; n++; } });
    if(!n){toast('カラーが見つかりません');return;}
    refreshBundle(); toast(`${n}ファミリーを読み込み`);
  }catch(e){ toast('JSONの形式が不正です'); }
};
render();
</script>
</body>
</html>
