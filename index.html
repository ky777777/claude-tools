<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: #e4e4e0;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #5e8aeb;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }

    header {
      max-width: 720px;
      margin: 0 auto 40px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .grid {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    a.card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    a.card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(94,138,235,0.08);
      transform: translateY(-1px);
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding-bottom: 24px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Claude Tools</h1>
  </header>

  <div class="grid">

    <a class="card" href="css_color_scale_gen/index.html">
      <div class="card-label">CSS</div>
      <div class="card-title">CSS カラースケール ジェネレーター</div>
    </a>

    <a class="card" href="css_clamp_gen/index.html">
      <div class="card-label">CSS</div>
      <div class="card-title">CSS clamp() ジェネレーター</div>
    </a>

    <a class="card" href="css_color_palette_gen/index.html">
      <div class="card-label">CSS</div>
      <div class="card-title">Color Palette ジェネレーター</div>
    </a>

    <a class="card" href="css_class_gen/index.html">
      <div class="card-label">CSS</div>
      <div class="card-title">CSS class ジェネレーター</div>
    </a>

    <a class="card" href="html_2026_template/index.html">
      <div class="card-label">テンプレート</div>
      <div class="card-title">HTML 2026 テンプレート</div>
    </a>

    <a class="card" href="path_gen/win2mac.html">
      <div class="card-label">ユーティリティ</div>
      <div class="card-title">パス変換ツール（Win → Mac）</div>
    </a>

    <a class="card" href="html_2026_template/index.html">
      <div class="card-label">テンプレート</div>
      <div class="card-title">HTML 2026 テンプレート</div>
    </a>
  </div>

</body>
</html>
