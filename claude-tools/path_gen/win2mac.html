<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パス変換ツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container { width: 100%; max-width: 660px; }

  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
  .tagline { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

  .card {
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  input[type=text], textarea {
    width: 100%;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 13px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 11px;
    background: #fafaf8;
    color: #1a1a1a;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus {
    outline: none;
    border-color: #4a90d9;
    background: #fff;
  }
  textarea { resize: vertical; min-height: 72px; }

  .preview {
    font-size: 11px;
    color: #aaa;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    margin-top: 8px;
    word-break: break-all;
    line-height: 1.8;
  }
  .preview em { color: #4a90d9; font-style: normal; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }

  button {
    padding: 7px 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #1a1a1a;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, transform 0.08s;
  }
  button:hover { background: #f5f5f0; }
  button:active { transform: scale(0.97); }

  .btn-blue { background: #f0f7ff; color: #2b6cb0; border-color: #bee3f8; }
  .btn-blue:hover { background: #e1f0ff; }

  .btn-orange { background: #fff8f0; color: #c05621; border-color: #fbd38d; }
  .btn-orange:hover { background: #fff0e0; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .status-badge.show { opacity: 1; transform: translateY(0); }
  .status-badge.green  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .status-badge.blue   { background: #f0f7ff; color: #2b6cb0; border: 1px solid #bee3f8; }
  .status-badge.orange { background: #fff8f0; color: #c05621; border: 1px solid #fbd38d; }

  .saved-tag { font-size: 12px; color: #38a169; }

  .result-box {
    background: #fafaf8;
    border: 1px solid #e8e8e4;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 13px;
    color: #1a1a1a;
    word-break: break-all;
    min-height: 46px;
    line-height: 1.7;
  }
  .result-box.empty { color: #bbb; font-family: inherit; font-size: 13px; }

  .finder-hint {
    font-size: 12px; color: #888; margin-top: 8px; line-height: 1.6;
  }
  .finder-hint code {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    background: #f0f0eb; padding: 1px 5px; border-radius: 4px; font-size: 12px; color: #444;
  }

  .result-area { margin-top: 1rem; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e4; }
    .card { background: #252525; border-color: #333; }
    input[type=text], textarea { background: #2a2a2a; border-color: #3a3a3a; color: #e8e8e4; }
    input[type=text]:focus, textarea:focus { background: #2f2f2f; border-color: #4a90d9; }
    button { background: #2a2a2a; border-color: #3a3a3a; color: #e8e8e4; }
    button:hover { background: #333; }
    .btn-blue { background: #1a2a3a; color: #90cdf4; border-color: #2a4a6a; }
    .btn-blue:hover { background: #1e3040; }
    .btn-orange { background: #2a1a0a; color: #f6ad55; border-color: #744210; }
    .btn-orange:hover { background: #301e0a; }
    .result-box { background: #2a2a2a; border-color: #333; color: #e8e8e4; }
    .result-box.empty { color: #555; }
    h1 { color: #e8e8e4; }
    .finder-hint code { background: #333; color: #ccc; }
    .preview em { color: #63b3ed; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>パス変換ツール</h1>
  <p class="tagline">Windows ↔ Mac（Google ドライブ）のパスをワンクリックで変換</p>

  <!-- 設定 -->
  <div class="card">
    <div class="card-label">設定（初回のみ）</div>
    <div class="field-row">
      <div class="field">
        <label>Macのユーザー名</label>
        <input type="text" id="macuser" placeholder="例：taro.yamada" oninput="updatePreview(); autosave()">
      </div>
      <div class="field" style="max-width:80px;">
        <label>ドライブレター</label>
        <input type="text" id="driveletter" placeholder="G" maxlength="1" oninput="updatePreview(); autosave()">
      </div>
    </div>
    <div class="field">
      <label>Googleドライブのメールアドレス</label>
      <input type="text" id="email" placeholder="例：taro.yamada@yourcompany.jp" oninput="updatePreview(); autosave()">
    </div>
    <div class="preview" id="preview">プレフィックス：<em>（入力すると表示されます）</em></div>
    <div class="btn-row">
      <span class="saved-tag" id="saved-tag" style="display:none">自動保存しました</span>
    </div>
  </div>

  <!-- Windows → Mac -->
  <div class="card">
    <div class="card-label">Windows → Mac</div>
    <div class="field">
      <label>WindowsパスをペーストしてEnter</label>
      <textarea id="winpath" placeholder="例：G:\共有ドライブ\H_デザイン\02_デザイン\"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-blue" onclick="convertToMac()">変換する</button>
      <button onclick="clearWin()">クリア</button>
      <span class="status-badge green" id="convert-mac-status">✓ 変換しました</span>
    </div>
    <div class="result-area">
      <label style="margin-bottom:6px;">変換結果（Macパス）</label>
      <div class="result-box empty" id="mac-result">ここに結果が表示されます</div>
      <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
        <button class="btn-blue" onclick="copyEl('mac-result','copy-mac-status')">コピーする</button>
        <span class="status-badge blue" id="copy-mac-status">✓ コピーしました</span>
      </div>
      <div class="finder-hint" id="mac-hint" style="display:none">
        コピー後、Finderで <code>⌘ Shift G</code> を押してパスを貼り付けると開けます
      </div>
    </div>
  </div>

  <!-- Mac → Windows -->
  <div class="card">
    <div class="card-label">Mac → Windows</div>
    <div class="field">
      <label>MacパスをペーストしてEnter</label>
      <textarea id="macpath" placeholder="例：/Users/taro.yamada/Library/CloudStorage/GoogleDrive-taro@company.jp/共有ドライブ/H_デザイン/"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-orange" onclick="convertToWin()">変換する</button>
      <button onclick="clearMac()">クリア</button>
      <span class="status-badge orange" id="convert-win-status">✓ 変換しました</span>
    </div>
    <div class="result-area">
      <label style="margin-bottom:6px;">変換結果（Windowsパス）</label>
      <div class="result-box empty" id="win-result">ここに結果が表示されます</div>
      <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
        <button class="btn-orange" onclick="copyEl('win-result','copy-win-status')">コピーする</button>
        <span class="status-badge orange" id="copy-win-status">✓ コピーしました</span>
      </div>
    </div>
  </div>

</div>

<script>
const KEY = 'win2mac_v4';

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      const o = JSON.parse(s);
      document.getElementById('macuser').value = o.macuser || '';
      document.getElementById('email').value = o.email || '';
      document.getElementById('driveletter').value = o.driveletter || 'G';
      updatePreview();
    }
  } catch(e) {}
}

function autosave() {
  try {
    localStorage.setItem(KEY, JSON.stringify({
      macuser: document.getElementById('macuser').value.trim(),
      email: document.getElementById('email').value.trim(),
      driveletter: document.getElementById('driveletter').value.trim()
    }));
  } catch(e) {}
  const tag = document.getElementById('saved-tag');
  tag.style.display = 'inline';
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => tag.style.display = 'none', 1500);
}

function getPrefix() {
  const m = document.getElementById('macuser').value.trim();
  const e = document.getElementById('email').value.trim();
  if (!m || !e) return null;
  return `/Users/${m}/Library/CloudStorage/GoogleDrive-${e}/`;
}

function getDriveLetter() {
  return (document.getElementById('driveletter').value.trim() || 'G').toUpperCase();
}

function updatePreview() {
  const p = getPrefix();
  const d = getDriveLetter();
  const el = document.getElementById('preview');
  if (p) {
    el.innerHTML = `Macプレフィックス：<em>${p}</em><br>Windowsドライブ：<em>${d}:\\</em>`;
  } else {
    el.innerHTML = 'プレフィックス：<em>（入力すると表示されます）</em>';
  }
}

function showStatus(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2000);
}

function convertToMac() {
  const raw = document.getElementById('winpath').value.trim();
  if (!raw) { alert('Windowsパスを入力してください'); return; }
  const prefix = getPrefix();
  if (!prefix) { alert('設定を入力してください'); return; }

  let path = raw.replace(/\\/g, '/').replace(/^[A-Za-z]:\/?/, '').replace(/^\//, '');
  const macPath = prefix + path;

  const el = document.getElementById('mac-result');
  el.textContent = macPath;
  el.classList.remove('empty');
  document.getElementById('mac-hint').style.display = 'block';
  showStatus('convert-mac-status');
}

function convertToWin() {
  const raw = document.getElementById('macpath').value.trim();
  if (!raw) { alert('Macパスを入力してください'); return; }
  const prefix = getPrefix();
  if (!prefix) { alert('設定を入力してください'); return; }
  const drive = getDriveLetter();

  if (!raw.startsWith(prefix)) {
    alert('設定のユーザー名・メールアドレスと一致しないパスです');
    return;
  }

  let path = raw.slice(prefix.length).replace(/\//g, '\\');
  const winPath = drive + ':\\' + path;

  const el = document.getElementById('win-result');
  el.textContent = winPath;
  el.classList.remove('empty');
  showStatus('convert-win-status');
}

function copyEl(elId, statusId) {
  const el = document.getElementById(elId);
  if (!el || el.classList.contains('empty')) return;
  const text = el.textContent;
  const doSuccess = () => showStatus(statusId);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doSuccess).catch(() => fallbackCopy(text, doSuccess));
  } else {
    fallbackCopy(text, doSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function clearWin() {
  document.getElementById('winpath').value = '';
  const el = document.getElementById('mac-result');
  el.textContent = 'ここに結果が表示されます';
  el.classList.add('empty');
  document.getElementById('mac-hint').style.display = 'none';
}

function clearMac() {
  document.getElementById('macpath').value = '';
  const el = document.getElementById('win-result');
  el.textContent = 'ここに結果が表示されます';
  el.classList.add('empty');
}

document.getElementById('winpath').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); convertToMac(); }
});
document.getElementById('macpath').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); convertToWin(); }
});

load();
updatePreview();
</script>
</body>
</html>
